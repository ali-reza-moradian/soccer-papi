# Soccer Arbitrage Sniper — configuration.
# Everything the engine needs that is not a secret. Secrets (ODDS_PAPI_KEY,
# TELEGRAM_BOT_KEY, TELEGRAM_GROUP_ID) come from the environment / GitHub Actions.

sport_id: 10                         # OddsPapi soccer sportId (confirm via /v4/sports)

# UTC window we care about. odds-by-tournaments returns ALL events for a league;
# we filter to fixtures whose kickoff falls inside this window and is in the future.
# NOTE: the window is computed dynamically in src/config.py (load_config) — a rolling
# "now -> end of (today + 2 days) 23:59:59Z" UTC range — so there are NO hardcoded dates
# here. A workflow_dispatch run may still override it via the FROM_DATE / TO_DATE env.

tournaments:
  match_name_regex: "world.cup|fifa world cup"   # FIFA World Cup only, via /v4/tournaments
  # Pinned to tournamentId 16 = "World Cup" — the only WC tournament carrying fixtures. Pinning
  # short-circuits regex discovery; clear this list to re-resolve from the API against the regex.
  pinned_ids: [16]
  national_teams_only: true          # World Cup is national-team only; exclude club/simulated variants

bookmakers:
  # Exactly four books are scanned now. Both lists are identical, so every arb is
  # actionable and shadow arbs operate across the same 4 books.
  actionable: [kalshi, polymarket, pinnacle, 1xbet]
  tracked:    [kalshi, polymarket, pinnacle, 1xbet]
  # Treated as betting exchanges: liquidity from exchangeMeta/limit, may charge commission.
  # kalshi <-> polymarket arbs are valid exchange-vs-exchange opportunities and are NOT filtered.
  # betfair-ex/betfair-spb/matchbook/smarkets arrive via the the-odds-api feed (no exchangeMeta),
  # so they carry no live liquidity (limit=None -> low_confidence) but DO charge commission.
  exchanges:  [kalshi, polymarket, betfair-ex, betfair-spb, matchbook, smarkets]
  # Commission charged on net winnings (decimal). Sportsbooks default to 0. The exchange rates below
  # are CONSERVATIVE DEFAULTS — adjust to your actual account tier. Applied via eff_odds in BOTH the
  # actionable and shadow universes, so observed exchange arbs are already net of commission.
  commission:
    # FLAT APPROXIMATION of Kalshi's QUADRATIC sports trading fee. Real fee ≈ ceil(0.06 × C × P ×
    # (1−P)) per contract, where P = price in dollars — so it is highest near the 50¢ midpoint and
    # tapers toward the price extremes (favourites/longshots). As a fraction of NET winnings that is
    # ≈ 0.06 × P; 0.03 is the even-money (~50¢) peak. We apply it as a single flat rate via eff_odds
    # in both universes. TODO: refine to the real per-price formula if kalshi arbs look promising;
    # CONFIRM against your account's actual fee tier first.
    kalshi: 0.03
    polymarket: 0.0
    betfair-ex: 0.05      # adjustable — standard Betfair Exchange ~2-5%; conservative 5%
    betfair-spb: 0.05     # adjustable — Betfair Sportsbook-via-exchange; conservative 5%
    matchbook: 0.02       # adjustable — Matchbook ~1.5-2%; conservative 2%
    smarkets: 0.02        # adjustable — Smarkets ~2%; conservative 2%

theoddsapi:
  # Supplemental SECOND data source (the-odds-api.com, key in ODDS_API_KEY). Fills WC gaps OddsPapi
  # leaves: recovers books it returns suspended (1xbet) and adds soft books (bet365, unibet, …).
  # It gap-fills the OddsPapi feed by canonical fixtureId/marketId/outcomeId, so the arb engine,
  # clone-dedup, and staleness rules apply unchanged. See src/theoddsapi.py.
  enabled: true
  wc_key: soccer_fifa_world_cup      # confirmed active; has_outrights=false (we skip the winner outright)
  regions: eu,uk                     # both regions (6 credits/poll); 100K credits/15d covers 15-min cadence (~17,280)
  markets: h2h,spreads,totals        # h2h→1x2, spreads→asian_handicap, totals→over/under
  # MASTER SWITCH: while false, NO the-odds-api leg can form an actionable arb / send a Telegram
  # alert — they are tracked (shadow) only. When true, the per-book allow-list below (actionable_books)
  # is the REAL control over which recovered books may turn an arb actionable.
  actionable: true
  # Per-book actionable allow-list WITHIN the-odds-api (canonical post-alias slugs). Even with the
  # master switch on, ONLY recovered books listed here may make an arb actionable; every other
  # the-odds-api book (the soft books further down) stays shadow-only no matter what. 1xBet is the
  # one the-odds-api book we hold an account on, so it is the sole actionable recovered book.
  # NOTE: a the-odds-api SPREAD additionally needs an OddsPapi book on the same marketId+handicap to
  # validate the sign mapping before it can be actionable (see run._scan). Omit/empty => no per-book
  # restriction (any recovered book may be actionable when the master switch is on).
  actionable_books:
    - 1xbet
  commence_tolerance_minutes: 120    # a fixture matches only if team identity AND kickoff agree within this
  # Canonical-slug allow-list (post-alias). Every the-odds-api book confirmed present in the
  # OddsPapi catalog from the eu/uk shadow run. Omit/empty would ingest all catalog books the feed
  # returns. Pinnacle is intentionally absent — OddsPapi sources it actively, so we defer (no
  # double-sourcing). Aliases (onexbet→1xbet, betfair_ex_*→betfair-ex, unibet_*→unibet, …) live in
  # src/theoddsapi.py.
  books:
    - 1xbet
    - unibet
    - williamhill
    - paddypower
    - skybet
    - coral
    - ladbrokes
    - betway
    - boylesports
    - 888sport
    - betsson
    - nordicbet
    - tipico
    - leovegas
    - casumo
    - grosvenor
    - coolbet
    - virginbet
    - livescorebet
    - winamax.fr
    - winamax.de
    - matchbook
    - betfair-ex
    - betfair-spb
    - betfred
    - betvictor          # in plan grant; needs a bookmaker-catalog refresh to leave the skip list
    - smarkets           # in plan grant; needs a bookmaker-catalog refresh to leave the skip list

kalshi:
  # Supplemental THIRD data source (Kalshi prediction exchange, kalshi.com). No auth for market
  # data. It overrides OddsPapi's suspended `kalshi` entry with live per-match World Cup result
  # odds, merging by canonical fixtureId/marketId/outcomeId exactly like the-odds-api — so the arb
  # engine, clone-dedup, staleness and mapping-guard run unchanged. See src/kalshi.py.
  enabled: false                     # fetch gate: build + verify shadow-only first, THEN enable
  base_url: https://external-api.kalshi.com/trade-api/v2
  # Per-match WORLD CUP RESULT series: KXWCGAME. Event tickers are KXWCGAME-<YYMMMDD><HOME3><AWAY3>
  # (e.g. KXWCGAME-26JUN12USAPAR), one event per match with 3 mutually-exclusive Yes markets —
  # home win / Tie / away win, settled at 90 min + stoppage (regulation 1X2). NOT KXMENWORLDCUP
  # (the tournament winner outright, out of scope).
  series_ticker: KXWCGAME
  # SHADOW gate (separate from the `kalshi` slug already in bookmakers.actionable): while false, any
  # arb containing a kalshi-DIRECT leg is forced non-actionable, so kalshi-direct stays shadow-only
  # for verification across a few live runs — exactly like the the-odds-api rollout. Flip to true
  # once the recovered prices/limits/fixtures look right in the logs/CSV.
  actionable: false
  # Events are matched to canonical fixtures by normalized team names + the event-ticker DATE on the
  # UTC calendar day (no precise kickoff in the ticker), so there is no ±minutes tolerance knob here.

markets:
  exclude: [double_chance]           # market families to never scan (overlap 1x2 → bad for arbing)
  exclude_names: ["double chance"]   # case-insensitive substrings of marketName to drop
  allow_quarter_lines: false         # Asian quarter lines (e.g. 2.75) are NOT clean 2-way arbs
  # SCOPE GUARD (resolve-within-window): we only scan per-match markets that SETTLE by the
  # fixture's kickoff/end — those resolve well inside the 2-day scan window. Tournament-level
  # futures (outright winner, group winner, golden boot, to-qualify/advance/reach-the-final, …)
  # resolve weeks out and are explicitly OUT of scope. Any market whose name contains one of these
  # case-insensitive substrings is skipped — even if it is 2-/3-way shaped and would otherwise
  # classify as 1x2/handicap. Tune this list if the feed starts carrying new long-dated markets.
  exclude_future_names:
    - outright
    - to qualify
    - to advance
    - to reach
    - reach the final
    - finalist
    - golden boot
    - golden ball
    - golden glove
    - top goalscorer
    - top scorer
    - tournament winner
    - group winner
    - winner of group
    - to win group
    - to win the group
    - to win their group
    - group betting
    - stage of elimination
    - to be eliminated
    - to win the tournament
    - to win outright
    - to lift
    - to win the world cup
    - champion

mapping_guard:
  # Outcome-mapping sanity check. We ALWAYS key odds off the canonical outcomeId, but a book can
  # arrive (upstream) with home/away — or the two sides of a 2-way market — swapped, which would
  # mint a phantom arb (a heavy favourite shown as the underdog). On any market with a clear
  # favourite we compare each book to a trusted reference; a book that ranks the favourite and
  # underdog the OPPOSITE way is marked outcome_mapping_suspect and dropped for that market only.
  enabled: true
  reference_books: [pinnacle, 1xbet]   # truth source — first one present in the market wins
  min_favorite_ratio: 1.5              # only judge when reference underdog_odds >= this × favourite_odds
  dump_book: ""                        # set to a slug (e.g. bcgame) to log its raw per-outcome odds
                                       #   (env DEBUG_DUMP_BOOK overrides this for a one-off run)

thresholds:
  min_roi_pct: 0.5                   # ignore arbs below this ROI
  roi_suspicious_pct: 8.0            # above this → flag suspicious (likely stale/error line)
  min_total_stake: 20                # ignore arbs whose T_max is below this (liquidity junk)
  # Staleness is TIME-TO-KICKOFF-AWARE (replaces the old flat max_leg_age_minutes: 20). Soft books
  # hold steady pre-match lines for hours, so a flat 20-min cut threw away valid odds. A leg's price
  # is skipped if its changedAt is older than the limit for its fixture's time-to-kickoff bucket:
  #   kickoff > stale_far_horizon_hours away         -> max_leg_age_far_minutes  (lines barely move)
  #   between near & far horizon                      -> max_leg_age_mid_minutes
  #   within stale_near_horizon_hours of kickoff      -> max_leg_age_near_minutes (lines move fast)
  max_leg_age_far_minutes: 360       # >6h to kickoff: allow legs up to 6h old
  max_leg_age_mid_minutes: 60        # 1–6h to kickoff: allow legs up to 60 min old
  max_leg_age_near_minutes: 20       # <1h to kickoff: keep the tight 20-min cut
  stale_far_horizon_hours: 6         # boundary between the "far" (360m) and "mid" (60m) buckets
  stale_near_horizon_hours: 1        # boundary between the "mid" (60m) and "near" (20m) buckets
  near_miss_ceiling_S: 1.02          # count markets with 1.00 <= S <= this as near-misses
  closest_report_count: 10           # how many "closest to an arb" markets to print each run
  csv_dedup_minutes: 90              # same signature seen within this window → UPDATE row, don't duplicate
  unknown_limit_fallback: 100        # T_max fallback when NO leg has a known limit (marks low_confidence)
  low_confidence_limit_floor: 10     # any leg with limit null or < this ($) → low_confidence (kept, flagged)

telegram:
  rank_by: profit                    # profit (= roi * T_max) | roi
  local_tz: "America/Toronto"
  # When zero REAL arbs are found, send at most ONE short "no real arbs" summary per this many
  # minutes (default 60) — keeps the group informed without spamming every 15-min cycle. The
  # summary includes the shadow-arb count and the single best shadow arb if any exist.
  empty_notice_interval_minutes: 60

budget:
  safety_margin: 15                  # pre-flight guard: if (limit - count) <= this, skip the scan (exit 0)
  names_cache_hours: 6               # refresh the fixtures name map at most this often
  refresh_min_remaining: 24          # only auto-refresh missing catalogs if at least this many requests remain
  # NO per-cycle book cap: every scan fetches ALL usable books your plan grants (one billable
  # request each), so any pair of books can form an arb. If the key runs out of credits or is
  # rate-limited mid-fetch (HTTP 429/403), the run prints "API Key exhausted" and exits cleanly.

api:
  odds_verbosity: 3                  # higher = more markets/lines; bump if markets are missing
  odds_format: decimal
