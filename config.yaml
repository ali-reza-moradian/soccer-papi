# Soccer Arbitrage Sniper — configuration.
# Everything the engine needs that is not a secret. Secrets (ODDS_PAPI_KEY,
# TELEGRAM_BOT_KEY, TELEGRAM_GROUP_ID) come from the environment / GitHub Actions.

sport_id: 10                         # OddsPapi soccer sportId (confirm via /v4/sports)

# UTC window we care about. odds-by-tournaments returns ALL events for a league;
# we filter to fixtures whose kickoff falls inside this window and is in the future.
target_window:
  from_utc: "2026-06-05T00:00:00Z"
  to_utc:   "2026-06-08T23:59:59Z"

tournaments:
  match_name_regex: "friendl"        # used to discover friendlies via /v4/tournaments
  # Resolved 2026-06-05 from the cached catalog (senior national-team internationals):
  #   851 = "Int. Friendly Games"    (men's senior,   International)   <- primary
  #   852 = "Int. Friendly Games W"  (women's senior, International)
  # Youth (U21/U20/... ids 854,855,...), club, and simulated (SRL) leagues are excluded.
  # Drop 852 if you only want men's; clear this list to fall back to regex discovery.
  pinned_ids: [851, 852]
  national_teams_only: true          # prefer national-team friendlies over club/simulated variants

bookmakers:
  # Books I can actually bet right now (funded accounts). Real arbs use only these.
  actionable: [pinnacle, 1xbet, kalshi, polymarket]
  # Everything we want stats on. Shadow arbs may use any of these.
  tracked:    [pinnacle, 1xbet, kalshi, polymarket, stake, cloudbet, bcgame, roobet, sx.bet]
  # Treated as betting exchanges: liquidity from exchangeMeta/limit, may charge commission.
  # (Confirmed slugs from the cached bookmakers catalog.)
  exchanges:  [kalshi, polymarket, sx.bet, betfair-ex, matchbook, prophetx, limitless-ex, orbitx, overtime.io]
  # Commission charged on net winnings (decimal). Sportsbooks default to 0.
  commission:
    kalshi: 0.0
    polymarket: 0.0
    sx.bet: 0.0

markets:
  exclude: [double_chance]           # market families to never scan (overlap 1x2 → bad for arbing)
  exclude_names: ["double chance"]   # case-insensitive substrings of marketName to drop
  allow_quarter_lines: false         # Asian quarter lines (e.g. 2.75) are NOT clean 2-way arbs

thresholds:
  min_roi_pct: 0.5                   # ignore arbs below this ROI
  roi_suspicious_pct: 8.0            # above this → flag suspicious (likely stale/error line)
  min_total_stake: 20                # ignore arbs whose T_max is below this (liquidity junk)
  max_leg_age_minutes: 20            # skip any leg whose price changedAt is older than this
  near_miss_ceiling_S: 1.02          # count markets with 1.00 <= S <= this as near-misses
  closest_report_count: 10           # how many "closest to an arb" markets to print each run
  csv_dedup_minutes: 90              # same signature seen within this window → UPDATE row, don't duplicate
  unknown_limit_fallback: 100        # T_max fallback when NO leg has a known limit (marks low_confidence)

telegram:
  rank_by: profit                    # profit (= roi * T_max) | roi
  send_when_empty: false             # stay quiet when zero arbs (avoid spam); always logged regardless
  local_tz: "America/Toronto"

budget:
  safety_margin: 15                  # if (limit - count) <= this, refuse to run billable calls (exit 0)
  names_cache_hours: 6               # refresh the fixtures name map at most this often
  refresh_min_remaining: 24          # only auto-refresh missing catalogs if at least this many requests remain
  # The live free/standard plan returns ONE bookmaker per odds call, so each book = 1 request.
  # Per scan we fetch up to this many books (actionable first, then extra tracked). With the
  # 250/month free tier, every extra book per cycle multiplies monthly cost — tune with cadence.
  max_books_per_cycle: 4

api:
  odds_verbosity: 3                  # higher = more markets/lines; bump if markets are missing
  odds_format: decimal
