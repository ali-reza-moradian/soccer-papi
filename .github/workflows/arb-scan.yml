name: arb-scan

# Soccer arbitrage scanner. Runs entirely on GitHub Actions:
#   budget guard -> 1 billable odds-by-tournaments call -> detect arbs ->
#   append CSV -> Telegram top 3 -> commit data/ back to main.
on:
  schedule:
    # Every 15 minutes. NOTE: OddsPapi returns one bookmaker per odds call, so a cycle costs one
    # request per granted book (no per-cycle cap — every scan fetches ALL usable books). If the key
    # runs out (HTTP 429/403) the run prints "API Key exhausted" and exits cleanly. The scan window
    # is a rolling 2-day range computed at runtime; dispatch manually only to override it.
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      from_date:
        description: "Window start override (ISO 8601 UTC). Blank = rolling 2-day window."
        required: false
        default: ""
      to_date:
        description: "Window end override (ISO 8601 UTC). Blank = rolling 2-day window."
        required: false
        default: ""
      min_roi_pct:
        description: "Minimum ROI %% to record/report"
        required: false
        default: ""
      tournament_ids:
        description: "Comma-separated tournament IDs override (optional)"
        required: false
        default: ""
      dry_run:
        description: "Skip Telegram (still logs + writes CSV)"
        required: false
        type: boolean
        default: false

# Cancel any in-flight run when a new one starts, so a stalled scan never lets runs pile up
# (15-min cadence). The loser is cancelled, not queued.
concurrency:
  group: arb-scan
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scan cycle
        env:
          ODDS_PAPI_KEY: ${{ secrets.ODDS_PAPI_KEY }}
          TELEGRAM_BOT_KEY: ${{ secrets.TELEGRAM_BOT_KEY }}
          TELEGRAM_GROUP_ID: ${{ secrets.TELEGRAM_GROUP_ID }}
          FROM_DATE: ${{ github.event.inputs.from_date }}
          TO_DATE: ${{ github.event.inputs.to_date }}
          MIN_ROI_PCT: ${{ github.event.inputs.min_roi_pct }}
          TOURNAMENT_IDS: ${{ github.event.inputs.tournament_ids }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: python -m src.run

      - name: Commit CSV + cache back to main
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git commit -m "arb scan $(date -u +%Y-%m-%dT%H:%M:%SZ) [skip ci]"
          # Re-sync in case a sibling run committed while we worked, then push (retry once).
          for attempt in 1 2 3; do
            git pull --rebase --autostash origin main || true
            if git push origin HEAD:main; then
              echo "Pushed on attempt $attempt."
              break
            fi
            echo "Push failed (attempt $attempt), retrying..."
            sleep 5
          done
